version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'develop'
    schedule:
      interval: 'weekly'
    groups:
      dev-dependencies:
        dependency-type: 'development'
      react:
        patterns:
          - 'react'
          - 'react-dom'
    ignore:
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
    open-pull-requests-limit: 10

  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'develop'
    schedule:
      interval: 'weekly'
