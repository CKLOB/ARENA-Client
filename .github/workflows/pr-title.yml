name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read
  statuses: write

jobs:
  lint-pr-title:
    if: github.event.pull_request.base.ref != 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            style
            test
            docs
            ci
            chore
          requireScope: false
          subjectPattern: ^.+$

  check-main-pr-title:
    if: github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: PR 제목이 "merge to main"인지 확인
        run: |
          if [ "${{ github.event.pull_request.title }}" != "merge to main" ]; then
            echo "::error::main으로 향하는 PR 제목은 반드시 'merge to main'이어야 합니다."
            exit 1
          fi
